name: QA Testing Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  #Stage 1: Lint, Static Analysis
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter (if configured)
        run: echo "Linting step - configure ESLint if needed"
        continue-on-error: true

  #Stage 2: API Tests
  api-tests:
    name: API Tests (Newman/Postman)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run API Tests
        run: |
          if [ -f "tests/api/medusa-api.postman_collection.json" ]; then
            npx newman run tests/api/medusa-api.postman_collection.json \
              --reporters cli,json \
              --reporter-json-export reports/api-results.json
          else
            echo "No API test collection found - skipping"
          fi
        continue-on-error: true
      
      - name: Upload API test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: reports/api-results.json
          retention-days: 30

  #Stage 3: E2E Tests
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run E2E tests
        run: npx playwright test
        continue-on-error: true
      
      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  #Stage 4: Quality Gate
  quality-gate:
    name: Quality Gate Check
    runs-on: ubuntu-latest
    needs: [api-tests, e2e-tests]
    if: always()
    steps:
      - name: Quality Gate Summary
        run: |
          echo "       QUALITY GATE RESULTS"
          echo "Pipeline completed. Review artifacts for details."
          echo ""
          echo "Quality Thresholds:"
          echo "  - Critical test pass rate: >= 100%"
          echo "  - Overall test pass rate: >= 80%"
          echo "  - No critical defects allowed"